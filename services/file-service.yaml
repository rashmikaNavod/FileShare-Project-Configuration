spring:
  mvc:
    problemdetails:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/db-fileshare
    username: root
    password: Ijse@1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
#        format_sql: true

server:
  port: 0
  forward-headers-strategy: framework

servlet:
  multipart:
    enabled: true
    max-file-size: 10MB
    max-request-size: 10MB

app:
  storage:
    path: ${user.home}/.ijse/eca/files

eureka:
  instance:
    instance-id: ${spring.application.name}:${vcap.application.instance_id:${spring.application.instance_id:${random.value}}}