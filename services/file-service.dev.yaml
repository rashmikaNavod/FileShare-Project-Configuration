spring:
  mvc:
    problemdetails:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:12500/filesharedb
    username: root
    password: psql
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 0
  forward-headers-strategy: framework

servlet:
  multipart:
    enabled: true
    max-file-size: 10MB
    max-request-size: 10MB

app:
  storage:
    path: ${user.home}/.ijse/eca/files
